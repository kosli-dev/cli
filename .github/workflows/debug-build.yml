name: Debug build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: amd64 }
          - { os: linux,   arch: arm64 }
          - { os: darwin,  arch: amd64 }
          - { os: darwin,  arch: arm64 }
          - { os: windows, arch: amd64, ext: .exe }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'
          check-latest: true

      - name: Build kosli-${{ matrix.os }}-${{ matrix.arch }}
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: go build -o "kosli-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}" ./cmd/kosli/

      - id: upload
        uses: actions/upload-artifact@v7
        with:
          name: kosli-debug-${{ matrix.os }}-${{ matrix.arch }}
          path: kosli-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 14

      - name: Link artifact in run summary
        run: |
          NAME="kosli-debug-${{ matrix.os }}-${{ matrix.arch }}"
          GH_URL="${{ steps.upload.outputs.artifact-url }}"
          NIGHTLY_URL="https://nightly.link/${{ github.repository }}/actions/artifacts/${{ steps.upload.outputs.artifact-id }}.zip"
          echo "- ${NAME}: [GitHub (sign-in)](${GH_URL}) · [nightly.link (public)](${NIGHTLY_URL})" >> "$GITHUB_STEP_SUMMARY"

# Default values for k8s-reporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  # -- the kosli reporter image repository
  repository: ghcr.io/kosli-dev/cli
  # -- the kosli reporter image pull policy
  pullPolicy: IfNotPresent
  # -- the kosli reporter image tag, overrides the image tag whose default is the chart appVersion.
  tag: "v2.12.0"

# -- overrides the name used for the created k8s resources. If `fullnameOverride` is provided, it has higher precedence than this one
nameOverride: ""
# -- overrides the fullname used for the created k8s resources. It has higher precedence than `nameOverride`
fullnameOverride: ""

serviceAccount:
  # -- specifies whether a service account should be created
  create: true
  # -- specifies whether to create a cluster-wide permissions for the service account or namespace-scoped permissions. allowed values are: [cluster, namespace]
  permissionScope: cluster
  # -- annotations to add to the service account
  annotations: {}
  # -- the name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- the cron schedule at which the reporter is triggered to report to Kosli
cronSchedule: "*/5 * * * *"

# -- specifies how to treat concurrent executions of a Job that is created by this CronJob
concurrencyPolicy: Replace

# -- specifies the number of successful finished jobs to keep
successfulJobsHistoryLimit: 3

# -- specifies the number of failed finished jobs to keep
failedJobsHistoryLimit: 1

# -- custom labels to add to pods
podLabels: {}

kosliApiToken:
  # -- the name of the secret containing the kosli API token
  secretName: "kosli-api-token"
  # -- the name of the key in the secret data which contains the Kosli API token
  secretKey: "key"

reporterConfig:
  # -- the name of the Kosli org
  kosliOrg: ""
  # -- List of Kosli environments to report to. Each entry has required 'name' and optional namespace selectors.
  # Use one entry to report a single environment; use multiple entries to report to multiple environments with different selectors.
  # Per entry: name (required), namespaces, namespacesRegex, excludeNamespaces, excludeNamespacesRegex (optional).
  # Leave namespace fields unset for an entry to report the entire cluster to that environment.
  environments: []
  #  # One environment, entire cluster:
  #  - name: my-env
  #  # One environment, specific namespaces:
  #  - name: prod-env
  #    namespaces: [prod-ns1, prod-ns2]
  #  # Multiple environments with different selectors:
  #  - name: staging-env
  #    namespacesRegex: ["^staging-.*"]
  #  - name: infra-env
  #    excludeNamespaces: [prod-ns1, prod-ns2, default]
  # -- whether the dry run mode is enabled or not. In dry run mode, the reporter logs the reports to stdout and does not send them to kosli.
  dryRun: false
  # -- the http proxy url
  httpProxy: ""

  # -- the security context for the reporter cronjob
  # Set to null or {} to disable security context entirely (not recommended)
  # For OpenShift, you can omit runAsUser to let OpenShift assign the UID
  securityContext:
    # -- whether to allow privilege escalation
    allowPrivilegeEscalation: false
    # -- whether to run as non root
    runAsNonRoot: true
    # -- the user id to run as
    # Omit this field for OpenShift environments to allow automatic UID assignment
    runAsUser: 1000

# Uncomment the env variable below and replace <instance_name>, if you are on a single tenant Kosli instance
# env:
#   KOSLI_HOST: https://<instance_name>.kosli.com

# -- additional environment variables to inject into the reporter container.
# List of {name, value} or {name, valueFrom} entries, rendered verbatim into the container env.
# Use this when you need valueFrom (secretKeyRef / configMapKeyRef) or want a structure beyond simple key=value.
# For simple key=value pairs you can also use the `env:` map above.
extraEnvVars: []
  # - name: SSL_CERT_FILE
  #   value: /etc/ssl/certs/corporate/ca.crt
  # - name: MY_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: token

# -- additional Pod-level volumes to attach to the reporter pod.
# Rendered verbatim into the Pod spec alongside the chart's own volumes.
# Use together with `extraVolumeMounts` to mount Secrets, ConfigMaps, or other volumes into the container.
extraVolumes: []
  # - name: corporate-ca
  #   secret:
  #     secretName: corporate-ca-bundle

# -- additional container-level volumeMounts for the reporter container.
# Rendered verbatim into the container spec alongside the chart's own mounts.
extraVolumeMounts: []
  # - name: corporate-ca
  #   mountPath: /etc/ssl/certs/corporate
  #   readOnly: true

# -- convenience wrapper for mounting a corporate / custom CA bundle into the reporter's trust store.
# When enabled, the chart creates a Secret-backed volume and mounts the CA file into /etc/ssl/certs/
# using subPath so it is picked up additively by Go's standard library alongside the system CA bundle
# (no SSL_CERT_FILE env var needed; setting it would replace the system bundle and is the footgun this wrapper hides).
# The Secret itself must be created out-of-band, e.g.:
#   kubectl create secret generic corporate-ca-bundle --from-file=ca.crt=/path/to/corporate-ca.crt
customCA:
  # -- enable mounting a corporate/custom CA bundle into the trust store
  enabled: false
  # -- name of an existing Secret in the same namespace containing the CA bundle
  secretName: ""
  # -- key within the Secret that holds the PEM-formatted CA certificate (single cert or multi-cert PEM bundle)
  key: "ca.crt"

# -- any custom annotations to be added to the cronjob
podAnnotations: {}

resources:
  requests:
    # -- the memory request
    memory: "64Mi"
  limits:
    # -- the memory limit
    memory: "256Mi"
    # -- the cpu limit
    cpu: "100m"

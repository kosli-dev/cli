version: 2
project_name: kosli
before:
  hooks:
  - go mod tidy
  - rm -rf npm/cli-*/bin
builds:
  - id: kosli
    binary: kosli
    ldflags: 
      - -w -s
      - -X github.com/kosli-dev/cli/internal/version.version={{ .Tag }}
      - -X github.com/kosli-dev/cli/internal/version.gitCommit={{ .FullCommit }}
      - -X github.com/kosli-dev/cli/internal/version.gitTreeState=clean
      - -extldflags "-static"
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    ignore:
      - goos: windows
        goarch: arm 
    main: ./cmd/kosli/
    hooks:
      post:
        - cmd: >-
            bash -c '
            OS="{{ .Os }}";
            ARCH="{{ .Arch }}";
            [ "$OS" = "windows" ] && OS="win32";
            [ "$ARCH" = "amd64" ] && ARCH="x64";
            EXT="";
            [ "{{ .Os }}" = "windows" ] && EXT=".exe";
            mkdir -p npm/cli-${OS}-${ARCH}/bin &&
            cp "{{ .Path }}" npm/cli-${OS}-${ARCH}/bin/kosli${EXT} &&
            chmod +x npm/cli-${OS}-${ARCH}/bin/kosli${EXT}'

